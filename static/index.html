<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Transcriber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input, select, button {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }
        
        .status {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .status-item:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            font-weight: 600;
            color: #333;
        }
        
        .status-value {
            color: #666;
        }
        
        .transcript-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
        }
        
        .transcript-item {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }
        
        .transcript-item.final {
            background: #e8f5e8;
            border-left: 4px solid #28a745;
        }
        
        .transcript-item.interim {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            opacity: 0.8;
        }
        
        .transcript-text {
            color: #333;
            line-height: 1.5;
        }
        
        .transcript-time {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .success {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Clean Transcriber</h1>
        
        <div id="messages"></div>
        
        <div class="controls">
            <div class="control-group">
                <label for="apiKey">Deepgram API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your Deepgram API key">
            </div>
            
            <div class="control-group">
                <label for="device">Audio Device</label>
                <select id="device">
                    <option value="">Default Device</option>
                </select>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="gain">Gain (Volume)</label>
                <input type="range" id="gain" min="0.1" max="3.0" step="0.1" value="1.0">
                <span id="gainValue">1.0</span>
            </div>
        </div>
        
        <div class="button-group">
            <button id="startBtn" onclick="startTranscription()">Start Transcription</button>
            <button id="stopBtn" onclick="stopTranscription()" disabled>Stop Transcription</button>
        </div>
        
        <div class="status">
            <div class="status-item">
                <span class="status-label">Status:</span>
                <span class="status-value" id="status">Not started</span>
            </div>
            <div class="status-item">
                <span class="status-label">Device:</span>
                <span class="status-value" id="deviceStatus">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Sample Rate:</span>
                <span class="status-value" id="sampleRate">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Channels:</span>
                <span class="status-value" id="channels">-</span>
            </div>
        </div>
        
        <div class="transcript-container" id="transcript">
            <div style="text-align: center; color: #666; padding: 50px;">
                Transcription will appear here...
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isTranscribing = false;
        
        // Load saved API key
        document.getElementById('apiKey').value = localStorage.getItem('deepgram_api_key') || '';
        
        // Load devices on page load
        loadDevices();
        
        // Gain slider
        document.getElementById('gain').addEventListener('input', (e) => {
            document.getElementById('gainValue').textContent = e.target.value;
        });
        
        async function loadDevices() {
            try {
                const response = await fetch('/devices');
                const devices = await response.json();
                const select = document.getElementById('device');
                
                select.innerHTML = '<option value="">Default Device</option>';
                devices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device;
                    option.textContent = device;
                    select.appendChild(option);
                });
            } catch (error) {
                showMessage('Failed to load devices: ' + error.message, 'error');
            }
        }
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.status) {
                    updateStatus(data);
                } else if (data.text) {
                    addTranscript(data);
                }
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                if (isTranscribing) {
                    showMessage('Connection lost', 'error');
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                showMessage('WebSocket error', 'error');
            };
        }
        
        function updateStatus(status) {
            document.getElementById('status').textContent = status.status;
            document.getElementById('deviceStatus').textContent = status.device || '-';
            document.getElementById('sampleRate').textContent = status.sample_rate ? `${status.sample_rate} Hz` : '-';
            document.getElementById('channels').textContent = status.channels || '-';
        }
        
        function addTranscript(transcript) {
            const container = document.getElementById('transcript');
            
            // Clear placeholder text
            if (container.querySelector('div[style*="text-align: center"]')) {
                container.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `transcript-item ${transcript.is_final ? 'final' : 'interim'}`;
            
            const text = document.createElement('div');
            text.className = 'transcript-text';
            text.textContent = transcript.text;
            
            const time = document.createElement('div');
            time.className = 'transcript-time';
            time.textContent = new Date(transcript.timestamp * 1000).toLocaleTimeString();
            
            div.appendChild(text);
            div.appendChild(time);
            container.appendChild(div);
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
            
            // Remove interim transcripts
            if (transcript.is_final) {
                const interimElements = container.querySelectorAll('.interim');
                interimElements.forEach(el => el.remove());
            }
        }
        
        function showMessage(message, type) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = message;
            messagesDiv.appendChild(div);
            
            setTimeout(() => {
                div.remove();
            }, 5000);
        }
        
        async function startTranscription() {
            const apiKey = document.getElementById('apiKey').value;
            const device = document.getElementById('device').value;
            const gain = parseFloat(document.getElementById('gain').value);
            
            if (!apiKey) {
                showMessage('Please enter your Deepgram API key', 'error');
                return;
            }
            
            // Save API key
            localStorage.setItem('deepgram_api_key', apiKey);
            
            try {
                const response = await fetch('/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        api_key: apiKey,
                        device_id: device || null,
                        gain: gain
                    })
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    isTranscribing = true;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    showMessage('Transcription started', 'success');
                    
                    if (!ws) {
                        connectWebSocket();
                    }
                } else {
                    showMessage('Failed to start: ' + result, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }
        
        async function stopTranscription() {
            try {
                const response = await fetch('/stop', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    isTranscribing = false;
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('stopBtn').disabled = true;
                    showMessage('Transcription stopped', 'success');
                    updateStatus({ status: 'Stopped', device: null, sample_rate: null, channels: null });
                } else {
                    showMessage('Failed to stop: ' + result, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
