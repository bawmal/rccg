name: Build RCCG COM Bible-lite

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Whisper model
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path models
          Invoke-WebRequest -Uri "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin" -OutFile "models/ggml-base.en.bin"
          New-Item -ItemType Directory -Force -Path data
          Invoke-WebRequest -Uri "https://github.com/bawmal/rccg/releases/download/v1.0/rhema.db" -OutFile "data/rhema.db"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1"

      - name: Build Tauri app (Windows)
        run: cargo tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Whisper model
        run: |
          mkdir -p models data
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin" -o models/ggml-base.en.bin
          curl -L "https://github.com/bawmal/rccg/releases/download/v1.0/rhema.db" -o data/rhema.db

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1"

      - name: Build Tauri app (macOS)
        run: cargo tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
