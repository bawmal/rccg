name: Build RCCG COM Bible-lite

on:
  push:
    branches: [main]
    tags:
      - "v*"          # trigger release on version tags e.g. v1.0.0
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS
            artifact-name: macos
          - platform: windows-latest
            label: Windows
            artifact-name: windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1" --locked

      - name: Decompress rhema.db
        run: |
          gzip -d -k data/rhema.db.gz
        shell: bash

      - name: Install PyInstaller and dependencies
        run: |
          python3 -m pip install --break-system-packages pyinstaller websockets vosk sounddevice cffi 2>/dev/null || \
          python3 -m pip install pyinstaller websockets vosk sounddevice cffi 2>/dev/null || \
          pip3 install pyinstaller websockets vosk sounddevice cffi || true
        shell: bash

      - name: Download Vosk speech model
        run: |
          mkdir -p models
          if [ ! -d "models/vosk-model-en-us-0.22-lgraph" ]; then
            echo "Downloading Vosk English lgraph model (~120MB, better accuracy)..."
            for i in 1 2 3; do
              curl -L --retry 5 --retry-delay 5 -o /tmp/vosk-model.zip https://alphacephei.com/vosk/models/vosk-model-en-us-0.22-lgraph.zip && break
              echo "Download attempt $i failed, retrying..."
              sleep 10
            done
            if [ ! -f /tmp/vosk-model.zip ]; then
              echo "ERROR: Failed to download Vosk model"
              exit 1
            fi
            unzip -q /tmp/vosk-model.zip -d models/
            rm /tmp/vosk-model.zip
          fi
          ls -la models/
        shell: bash

      - name: Build full server binary
        run: |
          python3 -m PyInstaller serve.spec --distpath pyidist --workpath pyibuild --noconfirm
          mkdir -p binaries
          TRIPLE=$(rustc -vV | sed -n 's|host: ||p')
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp pyidist/server.exe "binaries/server-${TRIPLE}.exe"
            cp "binaries/server-${TRIPLE}.exe" "binaries/server-${TRIPLE}-full.exe"
          else
            cp pyidist/server "binaries/server-${TRIPLE}"
            chmod +x "binaries/server-${TRIPLE}"
            cp "binaries/server-${TRIPLE}" "binaries/server-${TRIPLE}-full"
          fi
          echo "Staged full binary:"
          ls -la binaries/
        shell: bash

      - name: Build Tauri app (full)
        run: cargo tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Collect full bundles
        run: |
          mkdir -p dist/bundles
          if [ "$RUNNER_OS" = "Windows" ]; then
            for f in target/release/bundle/msi/*.msi target/release/bundle/nsis/*.exe; do
              if [ -f "$f" ]; then
                base=$(basename "$f")
                ext="${base##*.}"
                name="${base%.*}"
                cp "$f" "dist/bundles/${name}-full.${ext}"
              fi
            done
          else
            for f in target/release/bundle/dmg/*.dmg; do
              if [ -f "$f" ]; then
                base=$(basename "$f")
                cp "$f" "dist/bundles/${base%.dmg}-full.dmg"
              fi
            done
          fi
          echo "Full bundles collected:"
          ls -la dist/bundles/
        shell: bash

      # Lite build: macOS only (Web Speech API works in WebKit/Safari engine).
      # Skipped on Windows because WebView2 blocks Web Speech API regardless of network.
      - name: Build lite server binary
        if: runner.os == 'macOS'
        run: |
          rm -rf models/vosk-model-en-us-0.22-lgraph pyidist pyibuild
          mkdir -p binaries
          LITE_BUILD=1 python3 -m PyInstaller serve.spec --distpath pyidist --workpath pyibuild --noconfirm
          TRIPLE=$(rustc -vV | sed -n 's|host: ||p')
          cp pyidist/server "binaries/server-${TRIPLE}"
          chmod +x "binaries/server-${TRIPLE}"
          cp "binaries/server-${TRIPLE}" "binaries/server-${TRIPLE}-lite"
          # Force Tauri to rebuild the bundle with the new binary
          rm -rf target/release/bundle
          echo "Staged lite binary:"
          ls -la binaries/
        shell: bash

      - name: Build Tauri app (lite)
        if: runner.os == 'macOS'
        run: cargo tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Collect lite bundles
        if: runner.os == 'macOS'
        run: |
          for f in target/release/bundle/dmg/*.dmg; do
            if [ -f "$f" ]; then
              base=$(basename "$f")
              cp "$f" "dist/bundles/${base%.dmg}-lite.dmg"
            fi
          done
          echo "All bundles collected:"
          ls -la dist/bundles/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-build
          path: dist/bundles/*
          if-no-files-found: warn

  # Create a GitHub Release when a version tag is pushed (e.g. git tag v1.0.0 && git push --tags)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/windows

      - name: Collect release files
        run: |
          mkdir -p dist/release
          find dist/macos -type f -name '*.dmg' -exec cp {} dist/release/ \;
          find dist/windows -type f \( -name '*.msi' -o -name '*.exe' \) -exec cp {} dist/release/ \;
          ls -la dist/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RCCG COM Bible-lite ${{ github.ref_name }}
          body: |
            ## RCCG COM Bible-lite ${{ github.ref_name }}

            ### Installation
            - **macOS**: Download the `.dmg`, open it, drag the app to Applications
            - **Windows**: Download the `.msi` or `.exe` installer and run it

            ### Installer variants
            - **Full** (`*-full.*`): Includes the offline Vosk speech model. Works completely offline. Available for macOS and Windows.
            - **Lite** (`*-lite.dmg`, macOS only): Smaller download (~60MB). No Vosk model — uses Safari's built-in Web Speech API (requires internet). Not available for Windows (WebView2 blocks Web Speech API).

            ### Requirements
            - No Python installation required — Python is bundled inside the app
            - Full build: No internet connection required for speech recognition
            - Lite build: Web Speech API requires an internet connection

            ### What's included
            - Live Bible verse detection via microphone (Vosk offline or Web Speech API)
            - Manual verse lookup with autocomplete
            - Approximate scripture quote matching
            - Fullscreen projection mode
            - KJV, NIV, and other translations
          files: dist/release/*
          draft: false
          prerelease: false
