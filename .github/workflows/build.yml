name: Build RCCG COM Bible-lite

on:
  push:
    branches: [main]
    tags:
      - "v*"          # trigger release on version tags e.g. v1.0.0
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS
            artifact-name: macos
            artifact-paths: |
              target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            label: Windows
            artifact-name: windows
            artifact-paths: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1" --locked

      - name: Install Python dependencies (websockets)
        run: |
          python3 -m pip install --break-system-packages websockets 2>/dev/null || \
          python3 -m pip install websockets 2>/dev/null || \
          pip3 install websockets || true
        shell: bash

      - name: Download rhema.db from data release
        run: |
          mkdir -p data
          curl -L -o data/rhema.db \
            https://github.com/bawmal/rccg/releases/download/data-latest/rhema.db
        shell: bash

      - name: Build Tauri app
        run: cargo tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-build
          path: ${{ matrix.artifact-paths }}
          if-no-files-found: warn

  # Create a GitHub Release when a version tag is pushed (e.g. git tag v1.0.0 && git push --tags)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/windows

      - name: Collect release files
        run: |
          mkdir -p dist/release
          find dist/macos -type f -name '*.dmg' -exec cp {} dist/release/ \;
          find dist/windows -type f \( -name '*.msi' -o -name '*.exe' \) -exec cp {} dist/release/ \;
          ls -la dist/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RCCG COM Bible-lite ${{ github.ref_name }}
          body: |
            ## RCCG COM Bible-lite ${{ github.ref_name }}

            ### Installation
            - **macOS**: Download the `.dmg`, open it, drag the app to Applications
            - **Windows**: Download the `.msi` installer and run it

            ### Requirements
            - Python 3.8+ must be installed on the target machine
            - Chrome browser recommended (for Web Speech API microphone access)

            ### What's included
            - Live Bible verse detection via microphone (Web Speech API)
            - Manual verse lookup with autocomplete
            - Approximate scripture quote matching
            - Fullscreen projection mode
            - KJV, NIV, and other translations
          files: dist/release/*
          draft: false
          prerelease: false
